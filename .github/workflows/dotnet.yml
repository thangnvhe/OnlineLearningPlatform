name: .NET Core Manual Build

on:
  # Thêm dòng này để cho phép chạy thủ công từ giao diện GitHub
  workflow_dispatch:
  
  # Nếu bạn muốn tắt hoàn toàn tự động khi Push, hãy xóa hoặc comment (thêm dấu #) 
  # phần push và pull_request dưới đây:
  # push:
  #   branches: [ "main" ]
  # pull_request:
  #   branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 8.0.x

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build --no-restore --configuration Release

    - name: Test
      run: dotnet test --no-build --verbosity normal